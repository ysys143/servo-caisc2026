schema_version: "5.0.0"
status: draft
title: SERVO v5 data-family contract (source_proposition / author_alignment / derived_claim / policy)
scope_statement: >-
  Declarative field-level contract for the four v5 data families (charter
  Part B.1-B.4, B.7). source_proposition stores quote/locator/modality only;
  no judgment field may appear there (forbidden_record_fields, enforced as
  V5_SOURCE_JUDGMENT_LEAK). author_alignment records are typed by
  assertion_kind (charter B.7): the fields each kind requires and forbids are
  declared in conditional_record_fields, keyed by the field named in
  conditional_discriminator_fields. functional_relation records may also
  carry the optional per-proposition proposition_tags field (rubric section
  3, charter B.8): optional_conditional_record_fields restricts it to its
  kind without making it required, and nested_record_fields declares the key
  allowlist for its entries. policy is case-level (one flat record per case
  file, no id, no record list) and decomposes each case's experiment-selection
  policy into the schema-v3 BED-lens axes of charter B.4 / contract section B
  (control_dependence / selection_signal / selection_objective /
  generation_scope / candidate_selection_rule / design_selection_rule /
  candidate_execution_rule / formal_epistemic_utility_evidence); it carries no
  explicit_bed compliance label. The action is a=(h,d,P,f) (charter B.4 /
  Framework): candidate h, experimental design d, protocol P, fidelity f.
  candidate_selection_rule names which candidate hypotheses h are chosen and
  design_selection_rule names how the experimental design/assay d is chosen --
  two SEPARATE selection axes (reviewer Item 2): choosing which h to test is not
  the same act as choosing the design d that best discriminates hypotheses or
  reduces uncertainty under a cost (the BED-central design axis).
  selection_objective (the pi-purpose facet) never mixes with any of the three
  rule axes: candidate_selection_rule names which candidates are chosen,
  design_selection_rule names how the experimental design is chosen,
  candidate_execution_rule names how the chosen candidates are run, and none
  carries an objective. generation_scope is a G/S-level provenance axis
  (not a Table-A column). Consumed by servo_v5_schema.py through a small hand-rolled line
  parser -- this file is not general YAML and must keep the exact section
  markers below.

directories:
  source_proposition: servo_v5_source_propositions
  author_alignment: servo_v5_alignments
  derived_claim: servo_v5_claims
  policy: servo_v5_policy

envelope_fields:
  source_proposition: [schema, schema_doc, status, coverage_status, case_id, system, citation_key, source_pdf_name, source_pdf_sha256, coverage_note, propositions]
  author_alignment: [schema, schema_doc, status, case_id, alignments]
  derived_claim: [schema, schema_doc, status, case_id, claims]
  policy: [schema, schema_doc, status, case_id, control_dependence, selection_signal, selection_objective, generation_scope, candidate_selection_rule, design_selection_rule, candidate_execution_rule, formal_epistemic_utility_evidence, rationale, axis_provenance]

required_envelope_fields:
  source_proposition: [schema, schema_doc, status, coverage_status, case_id, system, citation_key, source_pdf_name, source_pdf_sha256, coverage_note, propositions]
  author_alignment: [schema, schema_doc, status, case_id, alignments]
  derived_claim: [schema, schema_doc, status, case_id, claims]
  policy: [schema, status, case_id, control_dependence, selection_signal, selection_objective, generation_scope, candidate_selection_rule, design_selection_rule, candidate_execution_rule, formal_epistemic_utility_evidence, rationale]

record_fields:
  source_proposition: [proposition_id, locator, exact_quote, modality, named_actors, named_inputs, named_outputs, source_context_note]
  author_alignment: [alignment_id, proposition_ids, assertion_kind, basis, boundary_status, notes_verbatim, source_term, component, source_role, target_role, relation_type, temporal_scope, proposition_tags, polarity]
  derived_claim: [claim_id, support_status, claim_scope, alignment_kind, occurrence_resolution, used_alignment_ids, used_proposition_ids, rationale]

required_record_fields:
  source_proposition: [proposition_id, locator, exact_quote, modality, named_actors, named_inputs, named_outputs]
  author_alignment: [alignment_id, proposition_ids, assertion_kind, basis, boundary_status]
  derived_claim: [claim_id, support_status, claim_scope, alignment_kind, occurrence_resolution, used_alignment_ids, used_proposition_ids, rationale]

forbidden_record_fields:
  source_proposition: [support_status, claim_scope, alignment_kind, occurrence_resolution, servo_mapping, alignment_id, claim_id, decision_role, evaluator_substrate]

# assertion_kind (charter B.7) selects which extra fields an author_alignment
# record carries. Fields listed for a kind other than the record's own are
# rejected as V5_ALIGNMENT_KIND_FIELD_MISMATCH; fields listed for the
# record's own kind and absent are rejected as V5_ALIGNMENT_MISSING_FIELD.
conditional_discriminator_fields:
  author_alignment: assertion_kind

conditional_record_fields:
  author_alignment:
    component_mapping: [source_term, component]
    functional_relation: [source_role, target_role, relation_type, temporal_scope]

# optional_conditional_record_fields (rubric section 3, charter B.8): like
# conditional_record_fields, a field listed here is rejected as
# V5_ALIGNMENT_KIND_FIELD_MISMATCH on any kind other than the one it is
# listed under, but -- unlike conditional_record_fields -- it is never
# required on its own kind. proposition_tags carries T6 derive_claim inputs
# (occurrence_class/structurally_inferred/polarity per proposition) and is
# optional even on functional_relation. polarity (v5-rubric-4) is the
# disposition host for absence/denial statements that yield only a
# component_mapping: the negative/absence rule (rubric section 2) forbids a
# positive functional_relation, so such a record has no proposition_tags to
# carry polarity=explicit_denial -- it is recorded directly on the
# component_mapping instead. It is therefore restricted to component_mapping
# (rejected on functional_relation, which records polarity inside
# proposition_tags) and never required.
optional_conditional_record_fields:
  author_alignment:
    component_mapping: [polarity]
    functional_relation: [proposition_tags]

# nested_record_fields declares the key allowlist for object entries nested
# inside a record field (charter B.8 per-proposition tags). Unlisted keys in
# an entry are rejected as V5_ALIGNMENT_TAG_FIELD_UNKNOWN.
nested_record_fields:
  author_alignment:
    proposition_tags: [proposition_id, occurrence_class, structurally_inferred, polarity]

locator_fields:
  required: [pdf_page]
  optional: [journal_page, para_anchor, section]

enum_fields:
  source_proposition.status: [draft, pilot, frozen]
  source_proposition.coverage_status: [body_complete, body_complete_appendix_partial, config_bounded_complete, review_bounded_complete]
  source_proposition.modality: [directly_reported, reported_as_procedure, reported_only_as_capability]
  author_alignment.assertion_kind: [component_mapping, functional_relation]
  author_alignment.component: [S, G, E, V, M, pi, A, W_A, external, O_env]
  author_alignment.basis: [source_explicit, author_aligned]
  author_alignment.boundary_status: [reported, boundary_unreported]
  author_alignment.source_role: [candidate, action, execution, observation, evaluation, inquiry_state, memory, artifact, policy, environment, external, generation]
  author_alignment.target_role: [candidate, action, execution, observation, evaluation, inquiry_state, memory, artifact, policy, environment, external, generation]
  author_alignment.relation_type: [produces, evaluates, updates, conditions, selects, revises, reads, writes, triggers]
  author_alignment.temporal_scope: [per_step, cross_step]
  author_alignment.polarity: [neutral, explicit_denial]
  author_alignment.proposition_tags.occurrence_class: [single_event, cross_run_trend, architecture, habitual_procedure, capability_only]
  author_alignment.proposition_tags.polarity: [neutral, explicit_denial]
  derived_claim.support_status: [supported, unresolved, contradicted, not_applicable]
  derived_claim.claim_scope: [architecture, procedure, aggregate_run, occurrence]
  derived_claim.alignment_kind: [source_explicit, author_aligned]
  derived_claim.occurrence_resolution: [resolved, unresolved, not_applicable]
  policy.control_dependence: [fixed_or_predefined, failure, score, observation_result, uncertainty, candidate_disagreement, not_reported]
  policy.selection_objective: [local_repair, performance_improvement, uncertainty_reduction, hypothesis_model_discrimination, diversity_directed_selection, not_reported]
  policy.generation_scope: [fixed_space, search_space_expansion, candidate_diversification]
  policy.candidate_selection_rule: [fixed, threshold, top_k_ranked, sampled_subset, sequential_choice, exhaustive, not_reported]
  policy.design_selection_rule: [fixed_or_standard_design, discrimination_directed, information_directed, cost_directed, coverage_or_factorial, not_reported]
  policy.candidate_execution_rule: [all_selected, one_at_a_time, batch, until_success, until_budget, source_unreported]

# policy (charter B.4, schema-v3 re-derivation per contract section B,
# 2026-07-23): BED is an analytic decomposition lens, NOT a compliance label.
# The policy record decomposes each case's experiment-selection policy into
# eight axes instead of scoring an explicit_bed mechanism. Six are enum-valued
# non-empty lists (enum_fields above, validated by _check_policy_record):
# control_dependence, selection_objective, generation_scope,
# candidate_selection_rule, design_selection_rule and candidate_execution_rule.
# Design rules of the v3 re-derivation:
#   - control_dependence retired the old `none`. Outcome-independence that the
#     source CONFIRMS is `fixed_or_predefined`; source silence is `not_reported`
#     (never read silence as fixed). These are distinct enum values.
#   - selection_objective is the pi-purpose facet only (local_repair,
#     performance_improvement, uncertainty_reduction,
#     hypothesis_model_discrimination, diversity_directed_selection), or the
#     literal not_reported when the bounded source establishes no uncertainty- or
#     discrimination-DIRECTED selection objective (e.g. C05: a measurement-power
#     design and a confirm/refute capability are reported, but exhaustive testing
#     of all hypotheses means no experiment is SELECTED, so no directed objective
#     is licensed -- read silence/capability as not_reported, never as a directed
#     objective). The old `performance`/`exploration` labels are retired;
#     `performance` folds into performance_improvement, `exploration` splits by
#     level (see below).
#   - generation_scope is a NEW G/S-level provenance axis (fixed_space /
#     search_space_expansion / candidate_diversification) that absorbs the
#     generation-side component of the retired `exploration`; it is NOT a
#     Table-A column and build_servo_v5_tables.py does not render it.
#   - candidate_selection_rule (NEW) = which candidate hypotheses h are chosen;
#     separated on purpose from candidate_execution_rule = how the chosen
#     candidates are run. The retired `expected_discrimination_selected` (which
#     mixed objective into the rule) is deleted: a discrimination OBJECTIVE lives
#     in selection_objective, never in any rule.
#   - design_selection_rule (NEW, reviewer Item 2) = how the experimental
#     design/assay d is chosen, a SEPARATE axis from candidate_selection_rule.
#     The action is a=(h,d,P,f): choosing which candidate h to test is a distinct
#     act from choosing the design d that best discriminates hypotheses or reduces
#     uncertainty under a cost -- the BED-central "select the design" axis that the
#     seven-axis version did not code. Values: fixed_or_standard_design (a fixed or
#     standard assay/template applied uniformly, not selected among competing
#     designs) / discrimination_directed (design chosen to best discriminate
#     competing hypotheses/models) / information_directed (design chosen to
#     maximize expected information gain / reduce posterior uncertainty) /
#     cost_directed (design chosen to minimize experimental cost under a
#     discrimination/coverage constraint) / coverage_or_factorial (design chosen to
#     cover a factor space: factorial/blocked/Latin-square/grid/ablation sweep) /
#     not_reported (bounded source does not report how the design is chosen). A
#     "tested all hypotheses" fact (candidate_execution_rule=all_selected) is NOT
#     evidence about this axis: exhaustive candidate execution says nothing about
#     whether the experimental DESIGN is chosen by expected discrimination. The
#     bounded corpus reports no discrimination_directed / information_directed /
#     cost_directed design (a corpus-level observation, not a per-case verdict);
#     C05's Latin-square is coverage_or_factorial and the model-prescribed assay is
#     fixed_or_standard_design (the discrimination-directed experiment selection of
#     king 2004 is CITED BACKGROUND, not in the frozen sparkes 2010 C05 source).
# selection_signal is a non-empty free-string list (the concrete signal names;
# may overlap control_dependence but names something more specific, and a signal
# that is reported yet not used for selection stays here while
# control_dependence records not_reported/fixed_or_predefined). Every axis value
# is grounded in proposition_ids in rationale. formal_epistemic_utility_evidence
# is the AUXILIARY facet: a citation for a reported posterior/likelihood/EIG/
# VOI/epistemic-utility term, or the string "not_reported" when the bounded
# source reports none -- "not_reported" for all six cases (a corpus-level
# limitation, footnote only, not a per-case verdict). There is NO explicit_bed
# field, NO mechanism_labels/purpose_facets, and NO conditional evidence rule:
# the old V5_POLICY_EXPLICIT_BED_EVIDENCE_MISSING contract was retired with the
# compliance model.
